run_name: dsf_desi_lrg_lsst_y1_hod_nla

pk2d:
  model: hod_with_nla
  kwargs: {}

parameters:
  - name: Omega_m
    target: cosmology.Omega_m
    fiducial: 0.3156
    label: "\\Omega_m"
    prior_sigma: 0.15
    vary: true

  - name: sigma8
    target: cosmology.sigma8
    fiducial: 0.831
    label: "\\sigma_8"
    prior_sigma: 0.20
    vary: true

  - name: log10Mmin_0
    target: hod.log10Mmin_0
    fiducial: 12.5
    label: "\\log_{10}M_{\\min}"
    prior_sigma: 0.50
    vary: true

  - name: log10M1_0
    target: hod.log10M1_0
    fiducial: 13.5
    label: "\\log_{10}M_1"
    prior_sigma: 0.70
    vary: true

  - name: alpha_0
    target: hod.alpha_0
    fiducial: 1.0
    label: "\\alpha"
    prior_sigma: 0.50
    vary: true

  - name: A_IA
    target: ia.A_IA
    fiducial: 0.5
    label: "A_{\\rm IA}"
    prior_sigma: 1.0
    vary: true

cosmology:
  Omega_c: 0.2664315
  Omega_b: 0.0491685
  h: 0.6727
  n_s: 0.9645
  sigma8: 0.831
  w0: -1.0
  wa: 0.0
  transfer_function: boltzmann_camb
  matter_power_spectrum: halofit

hod:
  log10Mmin_0: 12.5
  log10Mmin_p: 0.0

  siglnM_0: 0.4
  siglnM_p: 0.0

  log10M0_0: 7.0
  log10M0_p: 0.0

  log10M1_0: 13.5
  log10M1_p: 0.0

  alpha_0: 1.0
  alpha_p: 0.0

  fc_0: 1.0
  fc_p: 0.0

  bg_0: 1.0
  bg_p: 0.0

  bmax_0: 1.0
  bmax_p: 0.0

  a_pivot: 1.0
  ns_independent: false
  is_number_counts: true

baryons:
  f_c: 1.0

halo_model:
  k:
    min: 1.0e-2
    max: 20.0
    n: 100

  redshift:
    min: 0.0
    max: 2.5
    n: 32

radial_bins:
  radius_eval:
    min: 10.0
    max: 50.0
    n: 6

  rp_bin_edges:
    min: 10.0
    max: 60.0
    n: 7

survey:
  lens_survey: desi
  source_survey: lsst
  area_deg2: 5000.0
  sigma_e: 0.26

tomography:
  lens:
    role: lens
    sample: lrg
    overrides:
      bins:
        edges: [0.4, 1.0]

  source:
    role: source
    year: "1"
    overrides:
      bins:
        scheme: equal_number
        n_bins: 5

bin_pair_selection:
  overlap_threshold: 0.10
  source_behind_lens: true
  center_method: mean

covariance:
  kind: gm
  nonlinear: true
  galaxy_bias: null
  galaxy_bias_prefactor: 1.0

fisher:
  run: true
  method: finite
  stepsize: 1.0e-2
  num_points: 5
  extrapolation: ridders
  levels: 4

dali:
  run: false
  forecast_order: 2
  method: finite
  stepsize: 1.0e-2
  num_points: 5
  extrapolation: ridders
  levels: 4

  sampling:
    run: true
    label: "DALI"
    n_steps: 10000
    burn: 2000
    thin: 2
    n_walkers: null
    init_scale: 0.5
    seed: 1234

  priors:
    bounds:
      Omega_m: [0.05, 0.60]
      sigma8: [0.40, 1.30]
      log10Mmin_0: [10.5, 14.5]
      log10M1_0: [11.0, 15.5]
      alpha_0: [0.1, 2.5]
      A_IA: [-5.0, 5.0]

    gaussian:
      run: true
      mean: null
      cov: null

ia:
  A_IA: 0.5
  C1rhocrit: 0.0134
  b_g: null
  a_bias: 0.67

output:
  directory: analysis/runs_output
  save_arrays: true
  save_summary: true
  make_plots: true
  reuse_covariance: true
